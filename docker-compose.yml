version: "3.9"
services:
  web:
    build: .
    container_name: bestholiday_web
    restart: always
    command: gunicorn myproject.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    depends_on:
      - db
    environment:
      - SECRET_KEY=django-insecure-3m9lj%3x%s2+n^+f_i10nhr2(&ugmo=s*=ynqaa8h@p_)f6nhl
      - DEBUG=False
      - DB_NAME=best_holiday
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - ALLOWED_HOSTS=51.20.38.1,127.0.0.1,localhost
      - CSRF_TRUSTED_ORIGINS=http://51.20.38.1,http://127.0.0.1,http://localhost
      - DATABASE_URL=postgres://postgres:postgres@db:5432/best_holiday

  db:
    image: postgres:16
    container_name: bestholiday_db
    restart: always
    environment:
      POSTGRES_DB: best_holiday
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  nginx:
    image: nginx:latest
    container_name: bestholiday_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - static_volume:/app/staticfiles
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
