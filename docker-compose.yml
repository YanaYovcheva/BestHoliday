version: "3.9"
services:
  web:
    build: .
    container_name: bestholiday_web
    restart: always
    command: gunicorn bestholiday.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/static
    depends_on:
      - db
    environment:
      - DEBUG=0
      - DATABASE_URL=postgres://postgres:postgres@db:5432/best_holiday

  db:
    image: postgres:16
    container_name: bestholiday_db
    restart: always
    environment:
      POSTGRES_DB: best_holiday
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  nginx:
    image: nginx:latest
    container_name: bestholiday_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - static_volume:/app/static
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
