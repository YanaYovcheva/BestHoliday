{% extends 'base.html' %}

{% block title %}Edit Profile - BestHoliday{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm p-4">
            <h1 class="h3 mb-4 text-center">Edit Profile</h1>

            <form method="post">
                {% csrf_token %}

                <h4 class="mb-3">Account Information</h4>
                {{ user_form.as_p }}

                <h4 class="mb-3 mt-4">Profile Information</h4>
                {{ profile_form.as_p }}

                <button type="submit" class="btn btn-primary w-100">Save Changes</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
