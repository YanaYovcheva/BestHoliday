{% extends 'base.html' %}

{% block title %}Delete Comment - BestHoliday{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm p-4">
            <h1 class="h3 mb-4 text-center">Delete Comment</h1>

            <p>Are you sure you want to delete this comment?</p>
            <p><em>{{ object.content }}</em></p>

            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger w-100">Delete</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
