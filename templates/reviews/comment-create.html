{% extends 'base.html' %}

{% block title %}Add Comment - BestHoliday{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm p-4">
            <h1 class="h3 mb-4 text-center">Add Comment</h1>

            <p><strong>Excursion:</strong> {{ excursion.title }}</p>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}

                <button type="submit" class="btn btn-primary w-100">Post Comment</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
